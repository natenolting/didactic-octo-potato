<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FXHASH Project</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body { display: flex; justify-content: center; align-items: center; }
      canvas { display: block; }
    </style>
    <!-- Patch canvas context creation so getImageData-heavy operations don't warn -->
    <script>
      const _getContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === "2d") attrs = { ...attrs, willReadFrequently: true };
        return _getContext.call(this, type, attrs);
      };
    </script>
    <!-- Load $fx SDK FIRST, before anything else -->
    <script src="fxhash.min.js"></script>
    <script src="chroma.min.js"></script>
    <script src="p5.min.js"></script>
  </head>
  <body>
    <script src="sketch.js"></script>
  </body>
</html>
